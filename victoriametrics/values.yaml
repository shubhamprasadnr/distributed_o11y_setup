vm:
  enabled: true
  #   Enable automatic CRD management via Helm subchart
  crds:
    enabled: false

  victoria-metrics-operator:
    enabled: true
    fullnameOverride: vm-operator
    operator:
      disable_prometheus_converter: false
    # resources:
    #   limits:
    #     cpu: "0.5"
    #     memory: 500Mi
    #   requests:
    #     cpu: "0.3"
    #     memory: 300Mi
    # tolerations:
    #   - key: "team"
    #     operator: "Equal"
    #     value: "o11y"
    #     effect: "NoSchedule"
    # nodeSelector:
    #   node-role.kubernetes.io/o11y: o11y
    crds:
      plain: false
      cleanup:
        enabled: false
    serviceMonitor:
      enabled: true
    image:
      registry: "quay.io"
      repository: victoriametrics/operator
      # tag: "v0.56.0"
    env:
      - name: "VM_USECUSTOMCONFIGRELOADER"
        value: "true"
      - name: VM_CUSTOMCONFIGRELOADERIMAGE
        value: "quay.io/victoriametrics/operator:config-reloader-v0.53.0"
      - name: VM_VLOGSDEFAULT_IMAGE
        value: "quay.io/victoriametrics/victoria-logs"
      - name: "VM_VMALERTDEFAULT_IMAGE"
        value: "quay.io/victoriametrics/vmalert"
      - name: "VM_VMAGENTDEFAULT_IMAGE"
        value: "quay.io/victoriametrics/vmagent"
      - name: "VM_VMSINGLEDEFAULT_IMAGE"
        value: "quay.io/victoriametrics/victoria-metrics"
      - name: "VM_VMCLUSTERDEFAULT_VMSELECTDEFAULT_IMAGE"
        value: "quay.io/victoriametrics/vmselect"
      - name: "VM_VMCLUSTERDEFAULT_VMSTORAGEDEFAULT_IMAGE"
        value: "quay.io/victoriametrics/vmstorage"
      - name: "VM_VMCLUSTERDEFAULT_VMINSERTDEFAULT_IMAGE"
        value: "quay.io/victoriametrics/vminsert"
      - name: "VM_VMBACKUP_IMAGE"
        value: "quay.io/victoriametrics/vmbackupmanager"
      - name: "VM_VMAUTHDEFAULT_IMAGE"
        value: "quay.io/victoriametrics/vmauth"
      - name: "VM_VMALERTMANAGER_ALERTMANAGERDEFAULTBASEIMAGE"
        value: "quay.io/prometheus/alertmanager"
      - name: "VM_CONFIG_RELOADER_REQUEST_CPU"
        value: "unlimited"
      - name: "VM_CONFIG_RELOADER_REQUEST_MEMORY"
        value: "unlimited"
      - name: "VM_CONFIG_RELOADER_LIMIT_CPU"
        value: "unlimited"
      - name: "VM_CONFIG_RELOADER_LIMIT_MEMORY"
        value: "unlimited"
      - name: "VM_VMAGENTDEFAULT_USEDEFAULTRESOURCES"
        value: "false"
      - name: "VM_VMALERTMANAGER_USEDEFAULTRESOURCES"
        value: "false"

  vmsingle:
    enabled: false

  vmcluster:
    enabled: true
    spec:
      retentionPeriod: 3d
      replicationFactor: 1
      vmstorage:
        replicaCount: 2
        extraArgs:
          search.maxUniqueTimeseries: "10000000000000"
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "0.5"
            memory: 1Gi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: gp2        # ← FIXED: added storageclass
              resources:
                requests:
                  storage: 5Gi
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: vmstorage
                topologyKey: kubernetes.io/hostname
        # tolerations:
        #   - key: "team"
        #     operator: "Equal"
        #     value: "o11y"
        #     effect: "NoSchedule"
        # nodeSelector:
        #   node-role.kubernetes.io/o11y: o11y

      vmselect:
        enabled: true
        replicaCount: 2
        extraArgs:
          memory.allowedPercent: "75"
          search.cacheTimestampOffset: 60m
          search.maxLabelsAPISeries: "10000000000000"
          search.maxMemoryPerQuery: 2GB
          search.maxPointsPerTimeseries: "10000000000000"
          search.maxQueryDuration: 10m
          search.maxQueryLen: "10000000000000"
          search.maxSeries: "10000000000000"
          search.maxUniqueTimeseries: "10000000000000"
        cacheMountPath: "/select-cache"
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: gp2        # ← FIXED: added storageclass
              resources:
                requests:
                  storage: 1Gi
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: vmselect
                topologyKey: kubernetes.io/hostname
        # resources:
        #   limits:
        #     cpu: 1
        #     memory: 1Gi
        #   requests:
        #     cpu: 1
        #     memory: 1Gi
        # tolerations:
        #   - key: "team"
        #     operator: "Equal"
        #     value: "o11y"
        #     effect: "NoSchedule"
        # nodeSelector:
        #   node-role.kubernetes.io/o11y: o11y

      vminsert:
        enabled: true
        replicaCount: 2
        extraArgs:
          maxLabelsPerTimeseries: "100"
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: vminsert
                topologyKey: kubernetes.io/hostname
        # resources:
        #   limits:
        #     cpu: "500m"
        #     memory: 500Mi
        #   requests:
        #     cpu: "500m"
        #     memory: 250Mi
        # tolerations:
        #   - key: "team"
        #     operator: "Equal"
        #     value: "o11y"
        #     effect: "NoSchedule"
        # nodeSelector:
        #   node-role.kubernetes.io/o11y: o11y

  # ── ALERTMANAGER ──────────────────────────────────────────────────────────
  # FIXED: enabled alertmanager so vmalert notifiers work
  alertmanager:
    enabled: true
    spec:
      replicaCount: 2                      # HA - 2 replicas
      retention: 120h                      # keep alerts for 5 days
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: gp2          # ← storageclass set
            resources:
              requests:
                storage: 1Gi
      # resources:
      #   limits:
      #     cpu: "0.5"
      #     memory: 200Mi
      #   requests:
      #     cpu: "0.2"
      #     memory: 100Mi

  # ── VMALERT ───────────────────────────────────────────────────────────────
  vmalert:
    enabled: true
    spec:
      selectAllByDefault: true
      evaluationInterval: 15s
      resources:
        limits:
          cpu: "0.5"
          memory: 500Mi
        requests:
          cpu: "0.2"
          memory: 200Mi
      # FIXED: notifiers now point to enabled alertmanager
      notifiers:
        - url: http://alertmanager-0.alertmanager-headless:9093
        - url: http://alertmanager-1.alertmanager-headless:9093
      # datasource points to vmselect for querying
      datasource:
        url: "http://vmselect-victoria-metrics-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8481/select/0/prometheus"
      # remoteWrite sends firing alerts back to vminsert for storage
      remoteWrite:
        url: "http://vminsert-victoria-metrics-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8480/insert/0/prometheus"
      # remoteRead reads alerting state from vmselect
      remoteRead:
        url: "http://vmselect-victoria-metrics-victoria-metrics-k8s-stack.monitoring.svc.cluster.local:8481/select/0/prometheus"
      # tolerations:
      #   - key: "team"
      #     operator: "Equal"
      #     value: "o11y"
      #     effect: "NoSchedule"
      # nodeSelector:
      #   node-role.kubernetes.io/o11y: o11y

  # ── VMAGENT ───────────────────────────────────────────────────────────────
  vmagent:
    enabled: true
    spec:
      selectAllByDefault: true
      serviceScrapeNamespaceSelector: {}
      scrapeInterval: 30s
      extraArgs:
        promscrape.maxScrapeSize: 200MB
        promscrape.dropOriginalLabels: "true"
        remoteWrite.label: cluster=teamlease,env=dev
      useVMConfigReloader: false
      # resources:
      #   limits:
      #     cpu: "1"
      #     memory: 1Gi
      #   requests:
      #     cpu: "0.5"
      #     memory: 500Mi
      # tolerations:
      #   - key: "team"
      #     operator: "Equal"
      #     value: "o11y"
      #     effect: "NoSchedule"
      # nodeSelector:
      #   node-role.kubernetes.io/o11y: o11y

  # ── KUBE STATE METRICS ────────────────────────────────────────────────────
  kube-state-metrics:
    enabled: true
    extraArgs:
      - --metric-labels-allowlist=pods=[*]
    # resources:
    #   requests:
    #     memory: "500Mi"
    #     cpu: "500m"
    #   limits:
    #     memory: "1Gi"
    #     cpu: "1"
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
      port: 8080
      targetPort: http-metrics
    rbac:
      create: true
    serviceAccount:
      create: true
      name: "kube-sa"
    livenessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /
        port: 8080
      initialDelaySeconds: 20
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
    # tolerations:
    #   - key: "team"
    #     operator: "Equal"
    #     value: "o11y"
    #     effect: "NoSchedule"
    # nodeSelector:
    #   node-role.kubernetes.io/o11y: o11y
    vmScrape:
      enabled: true
      spec:
        selector:
          matchLabels:
            app.kubernetes.io/name: '{{ include "kube-state-metrics.name" (index .Subcharts "kube-state-metrics") }}'
            app.kubernetes.io/instance: '{{ include "vm.release" . }}'
        endpoints:
          - port: http
            honorLabels: true
            metricRelabelConfigs:
              - action: labeldrop
                regex: (uid|container_id|image_id)
              - action: labelmap
                regex: label_(rems_.+)
              - action: labeldrop
                regex: label_rems_.+
        jobLabel: app.kubernetes.io/name

  defaultRules:
    create: false

  grafana:
    enabled: false

  defaultDashboards:
    enabled: false

  # ── NODE EXPORTER ─────────────────────────────────────────────────────────
  prometheus-node-exporter:
    enabled: true
    spec:
      jobLabel: jobLabel
      selector:
        matchLabels:
          app.kubernetes.io/name: '{{ include "prometheus-node-exporter.name" (index .Subcharts "prometheus-node-exporter") }}'
      endpoints:
        - port: metrics
          metricRelabelConfigs:
            - action: drop
              source_labels: [mountpoint]
              regex: "/var/lib/kubelet/pods.+"

  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false

# ── CRDs (managed separately) ─────────────────────────────────────────────
prometheus-operator-crds:
  enabled: true
