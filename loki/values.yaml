logging:
  global:
    dnsService: "kube-dns"
  loki:
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    commonConfig:
      replication_factor: 1
    compactor:
      compaction_interval: 10m
      delete_request_store: filesystem
      retention_delete_delay: 2h
      retention_enabled: true
      working_directory: /var/loki/compactor
    ingester:
      chunk_encoding: snappy
    limits_config:
      retention_period: 7d
    tracing:
      enabled: true
    querier:
      max_concurrent: 1
    auth_enabled: false

  deploymentMode: Distributed

  gateway:
    image:
      registry: docker.io
      repository: nginxinc/nginx-unprivileged
      tag: 1.27.3-alpine
    enabled: true
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
    tolerations:
      - key: "team"
        operator: "Equal"
        value: "o11y"
        effect: "NoSchedule"

  chunksCache:
    enabled: false
    batchSize: 4
    parallelism: 5
    timeout: 5s
    defaultValidity: 0s
    replicas: 1
    port: 11211
    resources: {}
    tolerations:
      - key: "team"
        operator: "Equal"
        value: "o11y"
        effect: "NoSchedule"

  # ── INGESTER ────────────────────────────────────────────────────────────
  ingester:
    replicas: 2
    persistence:
      enabled: true
      claims:
        - name: data
          size: 2Gi
          storageClass: gp2          # ← FIXED
          accessModes:
            - ReadWriteOnce
    zoneAwareReplication:
      enabled: false
    tolerations:
      - key: "team"
        operator: "Equal"
        value: "o11y"
        effect: "NoSchedule"

  querier:
    replicas: 1
    maxUnavailable: 1
    kind: Deployment
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 2
    tolerations:
      - key: "team"
        operator: "Equal"
        value: "o11y"
        effect: "NoSchedule"

  queryFrontend:
    replicas: 1
    maxUnavailable: 1
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 10
    tolerations:
      - key: "team"
        operator: "Equal"
        value: "o11y"
        effect: "NoSchedule"

  queryScheduler:
    replicas: 1
    tolerations:
      - key: "team"
        operator: "Equal"
        value: "o11y"
        effect: "NoSchedule"

  distributor:
    replicas: 1
    maxUnavailable: 1
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 10
    tolerations:
      - key: "team"
        operator: "Equal"
        value: "o11y"
        effect: "NoSchedule"

  # ── COMPACTOR ───────────────────────────────────────────────────────────
  compactor:
    replicas: 1
    enabled: true
    retention_enabled: true
    persistence:
      enabled: true
      claims:
        - name: data
          size: 1Gi
          storageClass: gp2          # ← FIXED

  # ── INDEX GATEWAY ────────────────────────────────────────────────────────
  indexGateway:
    enabled: true
    replicas: 1
    maxUnavailable: 1
    persistence:
      enabled: true
      size: 1Gi
      storageClass: gp2              # ← FIXED
    tolerations:
      - key: "team"
        operator: "Equal"
        value: "o11y"
        effect: "NoSchedule"

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0

  # ── MINIO ────────────────────────────────────────────────────────────────
  minio:
    enabled: true
    persistence:
      size: 15Gi
      storageClass: gp2              # ← FIXED
    service:
      type: ClusterIP
      port: "9000"
      nodePort: 32000

  ruler:
    enabled: false
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0
  singleBinary:
    replicas: 0
  lokiCanary:
    enabled: false
  test:
    enabled: false

fluent-bit:
  kind: DaemonSet
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 100m
      memory: 64Mi
  config:
    service: |
      [SERVICE]
          Flush        1
          Daemon       Off
          Log_Level    info
          Parsers_File parsers.conf
          HTTP_Server  On
          HTTP_Listen  0.0.0.0
          HTTP_Port    2020
    inputs: |
      [INPUT]
          Name             tail
          Path             /var/log/containers/*.log
          Parser           docker,cri
          Tag              kube.*
          Refresh_Interval 5
          Rotate_Wait      30
          Mem_Buf_Limit    5MB
          Skip_Long_Lines  On
          DB               /var/log/flb_kube.db
          Ignore_Older     4h
          multiline.parser docker,cri
    filters: |
      [FILTER]
          Name                kubernetes
          Match               kube.*
          K8S-Logging.Parser  On
          K8S-Logging.Exclude Off
          Keep_Log            On
          Merge_Log           On
    outputs: |
      [OUTPUT]
          Name              loki
          Match             *
          host              logging-loki-gateway.logging.svc.cluster.local
          port              80
          drop_single_key   on
          labels            namespace=$kubernetes['namespace_name'],container=$kubernetes['container_name'],service_name=$kubernetes['labels']['app'],name=$kubernetes['labels']['app.kubernetes.io/name'],application_group=$kubernetes['labels']['rems/application_group'],rems_service=$kubernetes['labels']['rems/service'],cluster=teamlease
          remove_keys       kubernetes
